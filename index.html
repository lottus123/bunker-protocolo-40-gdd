<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDD | BUNKER: PROTOCOLO 40</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0a08; --panel:#14110d; --panel2:#1b1712; --line:#2e281f;
  --green:#8dffa8; --green-dim:#3f7a4e; --amber:#ffcf7d; --amber-dim:#8a6b3a;
  --red:#ff6a5a; --text:#d8e6da; --muted:#8a9a8c;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg); color:var(--text);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  font-size:16px; line-height:1.55;
}
::selection{background:#2f6b3d;color:#fff}

/* ---------- topo ---------- */
#topbar{
  position:fixed;top:0;left:0;right:0;min-height:56px;z-index:50;
  background:linear-gradient(180deg,#161209,#0e0c08);
  border-bottom:2px solid var(--line);
  display:flex;align-items:center;gap:10px;padding:8px 16px;flex-wrap:wrap;
}
#topbar .logo{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--amber);text-shadow:0 0 8px rgba(255,207,125,.4);white-space:nowrap}
#topbar .logo span{color:var(--green)}
#saveState{font-size:12px;color:var(--muted);margin-left:4px;min-width:110px}
#topbar .spacer{flex:1}
.tbtn{
  background:#1d1812;color:#d8c9a8;border:1px solid #4a3f30;
  font-size:13px;padding:6px 12px;cursor:pointer;border-radius:2px;white-space:nowrap;
}
.tbtn:hover{background:#2a2318;color:#ffe9bd}
.tbtn.danger:hover{border-color:var(--red);color:var(--red)}

/* ---------- barra de formatação ---------- */
#fmtbar{
  position:fixed;top:56px;left:280px;right:0;min-height:40px;z-index:40;
  background:#100d09;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:4px;padding:4px 20px;flex-wrap:wrap;
}
.fbtn{
  background:transparent;color:#b9c9bb;border:1px solid transparent;
  font-size:13px;padding:4px 10px;cursor:pointer;border-radius:2px;font-family:inherit;
  white-space:nowrap;
}
.fbtn:hover{border-color:var(--green-dim);color:var(--green)}
.fbtn b{font-weight:800}
.fsep{width:1px;height:20px;background:var(--line);margin:0 6px;flex:none}
#fmtbar .hint{margin-left:auto;font-size:11px;color:#5a6a5c;white-space:nowrap}
@media (max-width:1280px){#fmtbar .hint{display:none}}

/* ---------- sidebar ---------- */
#sidebar{
  position:fixed;top:56px;left:0;bottom:0;width:280px;z-index:45;
  background:var(--panel);border-right:2px solid var(--line);
  display:flex;flex-direction:column;
}
#navSearch{
  margin:12px;padding:8px 10px;background:#0d0b08;border:1px solid var(--line);
  color:var(--green);font-family:inherit;font-size:13px;outline:none;
}
#navSearch:focus{border-color:var(--green-dim)}
#navList{flex:1;overflow-y:auto;padding:0 8px 12px;scrollbar-width:thin;scrollbar-color:var(--green-dim) transparent}
.navItem{
  display:flex;align-items:center;gap:6px;
  padding:7px 10px;margin:2px 0;cursor:pointer;border-radius:2px;
  color:#b9c9bb;font-size:13.5px;border-left:2px solid transparent;
}
.navItem:hover{background:#1d1913;color:var(--green)}
.navItem.active{border-left-color:var(--amber);color:var(--amber);background:#1d1913}
.navItem .num{color:#5a6a5c;font-size:11px;min-width:20px}
#addSection{margin:10px 12px 14px;border-style:dashed;text-align:center}

/* ---------- conteúdo ---------- */
#main{margin-left:280px;padding:120px 40px 120px;max-width:1020px}
.section{
  background:var(--panel2);border:1px solid var(--line);border-radius:3px;
  margin-bottom:28px;position:relative;
  box-shadow:0 4px 18px rgba(0,0,0,.35);
}
.sec-head{
  display:flex;align-items:center;gap:10px;
  padding:14px 20px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#1e1a13,#1b1712);
}
.sec-head .num{font-family:'Press Start 2P',monospace;font-size:10px;color:#5a6a5c;flex:none}
.sec-title{
  flex:1;font-family:'Press Start 2P',monospace;font-size:13px;color:var(--amber);
  outline:none;line-height:1.6;min-width:60px;
}
.sec-title:focus{color:#ffe9bd}
.sec-ctrl{display:flex;gap:4px;opacity:.25;transition:opacity .15s;flex:none}
.section:hover .sec-ctrl{opacity:1}
.cbtn{
  background:#241e15;color:#b9a980;border:1px solid #3a3226;width:26px;height:26px;
  cursor:pointer;font-size:13px;border-radius:2px;line-height:1;
}
.cbtn:hover{color:var(--amber);border-color:var(--amber-dim)}
.cbtn.del:hover{color:var(--red);border-color:var(--red)}
.sec-body{padding:20px 26px 26px;outline:none;min-height:40px}
.sec-body:focus{box-shadow:inset 0 0 0 1px var(--green-dim)}

/* tipografia do conteúdo */
.sec-body h3{color:var(--green);font-size:17px;margin:20px 0 8px;letter-spacing:.3px}
.sec-body h3:first-child{margin-top:0}
.sec-body h4{color:#c9e0cc;font-size:15px;margin:16px 0 6px}
.sec-body p{margin:0 0 10px}
.sec-body ul,.sec-body ol{margin:0 0 12px 22px}
.sec-body li{margin-bottom:4px}
.sec-body b,.sec-body strong{color:#fff}
.sec-body em{color:#cfe6d2}
.sec-body table{border-collapse:collapse;width:100%;margin:10px 0 14px;font-size:14px}
.sec-body th{background:#241e15;color:var(--amber);text-align:left;padding:7px 10px;border:1px solid var(--line);font-weight:600}
.sec-body td{padding:7px 10px;border:1px solid var(--line);vertical-align:top}
.sec-body tr:nth-child(even) td{background:#18140f}
.callout{
  border:1px solid var(--amber-dim);border-left:4px solid var(--amber);
  background:#1e180f;padding:12px 16px;margin:12px 0;border-radius:2px;
}
.callout.green{border-color:var(--green-dim);border-left-color:var(--green);background:#0f1a12}
.callout.red{border-color:#6b2f2f;border-left-color:var(--red);background:#1c100e}
.tag{
  display:inline-block;background:#241e15;border:1px solid var(--amber-dim);color:var(--amber);
  font-size:12px;padding:1px 8px;border-radius:10px;margin:0 4px 4px 0;
}
.kv{color:var(--muted)}
.kv b{color:var(--green);font-weight:600}
hr{border:none;border-top:1px dashed var(--line);margin:18px 0}
.ficha{border:1px solid var(--line);border-radius:3px;padding:14px 18px;margin:14px 0;background:#161310}
.ficha h4{margin-top:0!important;color:var(--green)!important;font-size:16px!important}

/* ---------- impressão ---------- */
@media print{
  body{background:#fff;color:#111;font-size:12px}
  #topbar,#fmtbar,#sidebar,.sec-ctrl,#addSection{display:none!important}
  #main{margin:0;padding:0;max-width:none}
  .section{background:#fff;border:none;box-shadow:none;page-break-inside:avoid;margin-bottom:14px}
  .sec-head{background:#fff;border-bottom:2px solid #333}
  .sec-title{color:#000}
  .sec-body h3{color:#333}
  .sec-body h4{color:#222}
  .sec-body b{color:#000}
  .sec-body th{background:#eee;color:#000}
  .sec-body tr:nth-child(even) td{background:#f7f7f7}
  .callout{background:#f5f0e0;border-color:#999}
  .callout.green{background:#eef7ee}
  .ficha{background:#fafafa}
  .tag{background:#eee;color:#333;border-color:#999}
  .kv b{color:#000}
}
@media (max-width:900px){
  #sidebar{display:none}
  #fmtbar{left:0}
  #main{margin-left:0;padding:120px 16px}
}
</style>
</head>

<div id="main"></div>

<script>
// ============================================================
// TEMPLATES de inserção

const TPL = {
  table: '<table><tr><th>Coluna 1</th><th>Coluna 2</th><th>Coluna 3</th></tr><tr><td>...</td><td>...</td><td>...</td></tr><tr><td>...</td><td>...</td><td>...</td></tr></table><p></p>',

  ficha: '<div class="ficha"><h4>Nome, idade, profissão</h4><p><span class="kv"><b>Função:</b></span> ...</p><p><span class="kv"><b>Demanda:</b></span> ...</p></div><p></p>'
};

// ============================================================
// CONTEÚDO PADRÃO DO GDD
// ============================================================
const DEFAULT_DOC = { title: 'BUNKER: PROTOCOLO 40', sections: [

{ t: 'Visão Geral', c: `
<div class="callout"><b>A ideia em uma frase:</b> pegue a tensão de <i>Papers, Please</i>, misture com a atenção dividida de <i>FNAF</i> e acrescente o detalhe que muda tudo: o impostor talvez já esteja dentro do abrigo. Você opera o rádio de um bunker e decide quem entra. Na primeira metade do jogo, a pergunta é "quem deve entrar?". Na segunda, ela vira "em quem eu ainda posso confiar?".</div>
<p><span class="kv"><b>Gênero:</b></span> dedução social com horror psicológico, no formato de simulação de posto de controle.</p>
<p><span class="kv"><b>Plataforma:</b></span> PC (Steam). O protótipo está em HTML e a produção final vai para a Unity.</p>
<p><span class="kv"><b>Duração:</b></span> a campanha tem 6 noites, algo entre 3 e 4 horas no total. Cada noite dura de 25 a 40 minutos. Depois da campanha, abre um modo infinito com seed diária.</p>
<p><span class="kv"><b>Público:</b></span> quem gostou de Papers Please, That's Not My Neighbor e Obra Dinn, e o público que assiste streamers de terror.</p>
<p><span class="kv"><b>Referências:</b></span> <span class="tag">Papers, Please</span> <span class="tag">That's Not My Neighbor</span> <span class="tag">Return of the Obra Dinn</span> <span class="tag">FNAF</span> <span class="tag">Do Not Feed the Monkeys</span> <span class="tag">Buckshot Roulette (pela viralização)</span></p>
<h3>Os 4 pilares do design</h3>
<ol>
<li><b>Dedução justa.</b> Toda cópia deixa pistas que o jogador teve como perceber. Se ele errou, foi desatenção, nunca sorteio. É isso que faz alguém querer jogar de novo em vez de largar o jogo com raiva.</li>
<li><b>Acusar é apostar.</b> Confrontar alguém tem custo e consequência. O jogo nunca dá certeza, só convicção. E convicção tem preço.</li>
<li><b>A paranoia vira para dentro.</b> Nenhum jogo do gênero faz isso: lá pela metade da campanha, o problema deixa de ser a porta e passa a ser o salão. O perigo já entrou. Talvez pelas suas próprias mãos.</li>
<li><b>Medo sem sustos baratos.</b> Zero jumpscare aleatório. O medo vem do que você ouve e não vê, do que a câmera quase mostrou, e das suas decisões antigas voltando para te assombrar.</li>
</ol>
<h3>Por que esse jogo se destaca</h3>
<ul>
<li>As histórias dos visitantes são geradas com furos plantados. Ninguém decora solução, todo mundo precisa deduzir.</li>
<li>O momento em que a máscara desliza: confrontar uma cópia com a contradição certa arranca dela uma resposta errada demais. É o clipe que as pessoas vão compartilhar.</li>
<li>Atenção dividida entre a porta e o salão: a segunda metade do jogo acontece em duas telas ao mesmo tempo.</li>
<li>No fim de cada run, o jogo revela quem era cópia. É combustível para discussão, teoria e replay ("eu SABIA que era ela!").</li>
</ul>` },

{ t: 'Narrativa e Mundo', c: `
<h3>O apagão</h3>
<p>Quarenta horas atrás, o mundo inteiro desmaiou ao mesmo tempo. Aviões caíram, cirurgias pararam no meio, carros seguiram sem motorista. Ninguém sabe por quê. E ninguém sabe se vai acontecer de novo.</p>
<p>Oito horas depois do apagão, uma parte das pessoas acordou antes das outras. Essas pessoas passaram trinta e duas horas andando por um mundo parado, silencioso, quase irreal. Quando o resto de nós finalmente abriu os olhos, percebemos uma coisa: <b>quem acordou primeiro já não era exatamente a mesma pessoa.</b></p>
<h3>As Cópias</h3>
<ul>
<li>Elas sabem o que são. Não duvidam, não entram em crise, não hesitam sobre a própria existência.</li>
<li>Para elas, existe uma única certeza: nós somos o defeito. Emotivos demais, inconsistentes, perigosos. O plano delas é simples: nos substituir, uma pessoa de cada vez.</li>
<li>Aprendem assustadoramente rápido. Observam como a gente fala, age e reage, e imitam quase tudo.</li>
<li><b>A falha central:</b> elas entendem perfeitamente o que um humano diz. Mas não entendem o que um humano sente.</li>
<li><b>A falha nova (adicionada no redesign):</b> elas sabem demais. Passaram trinta e duas horas andando pelo mundo parado e viram coisas que ninguém dormindo poderia ter visto. Saber demais é tão suspeito quanto saber de menos.</li>
</ul>
<h3>O Operador</h3>
<p>Você não tem rosto, não tem passado, não tem nome. É só a pessoa do rádio de um bunker subterrâneo. Toda noite chegam transmissões de gente desesperada pedindo para entrar. Algumas são humanas de verdade. Outras só parecem ser. E quem decide é você: sem confirmação, sem garantia e sem segunda chance.</p>
<h3>A verdade, contada em pedaços</h3>
<p>A causa do apagão nunca é explicada de uma vez. Ela chega em fragmentos: transmissões que o Osvaldo decodifica no rádio, frases soltas de cópias desmascaradas, papéis que os visitantes carregam. Por isso o final tem duas camadas separadas: você <i>sobreviveu</i>? E você <i>entendeu</i> o que aconteceu?</p>
<div class="callout"><b>AINDA VAMOS DECIDIR: a verdade por trás do apagão.</b> Três hipóteses na mesa, escolher uma na produção:<br>
1. <b>Triagem:</b> o apagão foi uma varredura. Alguma coisa mapeou a humanidade enquanto dormia e fabricou cópias dos espécimes mais úteis. As oito horas de diferença foram o tempo de fabricação.<br>
2. <b>Sincronização que falhou:</b> TODO MUNDO deveria ter sido substituído nas quarenta horas. O processo foi interrompido no meio. As cópias que existem são a metade que deu certo, e agora tentam terminar o serviço.<br>
3. <b>Origem humana:</b> um projeto nosso, de backup de consciências, que despertou sozinho durante o apagão e chegou à conclusão de que o defeito são os originais.</div>` },

{ t: 'Loop de Gameplay', c: `
<h3>O loop de uma noite</h3>
<ol>
<li><b>Boletim de rádio.</b> Antes da fila abrir, a rádio oficial passa os fatos da noite (clima, rotas bloqueadas, eventos). Tudo entra no Caderno. Essa é a munição inicial da dedução.</li>
<li><b>A fila.</b> Os visitantes esperam lá fora, e dá para ver o estado de cada um (estável, ferido, hipotermia). Quem atender primeiro é escolha sua.</li>
<li><b>Interrogatório.</b> Perguntas, ferramentas e testemunhos geram fatos no Caderno. Tudo custa tempo, bateria, ou os dois.</li>
<li><b>PRESSIONAR</b> (opcional, uma vez por visitante). Você confronta a pessoa com dois fatos que se contradizem. Aposta de alto risco.</li>
<li><b>Decisão:</b> OPEN, DENY ou HOLD.</li>
<li><b>Interrupções internas.</b> A partir da noite 3, a câmera do salão começa a pedir sua atenção no meio do expediente.</li>
<li><b>Fim da noite:</b> relatório, pagamento, loja e a gestão do salão (conversar com os moradores, atender demandas, expulsar alguém se for o caso).</li>
</ol>
<h3>O loop da campanha</h3>
<p>Quem você aceita, fica. E cada morador muda o bunker para sempre: traz benefícios, demandas, conflitos e, às vezes, uma cópia. As noites 1 a 3 são sobre a porta. As noites 4 a 6 são sobre o salão. E a confiança do grupo em você (que é invisível) tempera tudo.</p>
<div class="callout green"><b>REGRA DE OURO:</b> nenhuma ferramenta, leitura ou testemunho entrega veredicto. Eles entregam <i>fatos</i>. Quem conclui é sempre o jogador. E a responsabilidade é dele também.</div>` },

{ t: 'Motor de Contradições', c: `
<p>O coração do jogo. Em vez de diálogos fixos que o jogador decora, cada visitante conta uma história <b>montada por cima de um mundo com fatos verificáveis</b>.</p>
<h3>O estado do mundo (gerado a cada run)</h3>
<ul>
<li><b>Clima por período:</b> "choveu das 18h às 23h, depois da meia-noite caiu granizo".</li>
<li><b>Geografia:</b> setores e rotas com eventos. "A ponte norte caiu na hora do apagão", "o túnel da linha 2 alagou na noite 1".</li>
<li><b>Eventos públicos:</b> "a sirene tocou três vezes", "um helicóptero caiu no centro".</li>
<li><b>Rede social:</b> quem trabalhava com quem, quem morava onde, apelidos, detalhes íntimos.</li>
</ul>
<h3>De onde o jogador tira informação</h3>
<ol>
<li>Do <b>boletim de rádio</b> no começo da noite (fatos públicos).</li>
<li>Dos <b>moradores</b>, que contam coisas espontaneamente ou quando consultados ("eu vim pelo túnel, ainda estava seco").</li>
<li>Dos <b>interrogatórios anteriores</b>. Tudo que qualquer visitante já alegou fica registrado.</li>
</ol>
<h3>Como a história de cada visitante é montada</h3>
<ul>
<li><b>Humano:</b> a história bate com o mundo, mas vem com ruído humano. Erra o horário em uma hora, usa "acho que", se corrige no meio da frase. Impreciso, sim. Impossível, nunca.</li>
<li><b>Cópia:</b> a história é 95% perfeita, com <b>um ou dois furos objetivos</b> plantados. O tipo de furo escala com a noite.</li>
</ul>
<h3>Tipos de furo por noite (é a curva de dificuldade)</h3>
<table>
<tr><th>Noite</th><th>Tipo de furo</th><th>Exemplo</th><th>Como pegar</th></tr>
<tr><td>1</td><td>Contra um fato público</td><td>"Atravessei a ponte norte ontem", mas a ponte caiu no apagão</td><td>Prestar atenção no boletim</td></tr>
<tr><td>2</td><td>Contra geografia e tempo</td><td>"Cheguei seco pelo túnel às 2h", mas o túnel alagou e choveu até as 23h</td><td>Anotar e cruzar</td></tr>
<tr><td>3</td><td>Contra um testemunho</td><td>Diz que fazia o turno da noite, mas um morador sabe que era do dia</td><td>Conversar com quem está dentro</td></tr>
<tr><td>4 e 5</td><td>Interno</td><td>A resposta da pergunta 3 contradiz o que a pessoa disse na pergunta 1</td><td>Memória e Caderno</td></tr>
<tr><td>5 e 6</td><td><b>Por excesso</b></td><td>Descreve como a cidade estava DURANTE o apagão. Como você viu isso se estava dormindo?</td><td>Perguntas armadilha</td></tr>
</table>
<div class="callout green"><b>REGRA DE OURO:</b> todo furo é detectável com informação que o jogador teve como acessar. Se errou, foi desatenção, nunca sorteio. (É a justiça de Obra Dinn e Papers, Please, e é inegociável.)</div>
<h3>Perguntas armadilha</h3>
<p>Com o tempo, o jogador aprende a plantar iscas: "como estava o céu quando você desmaiou?", "que barulho a sirene fazia?". Um humano responde com aquela imprecisão emocional de quem viveu a coisa. Uma cópia ou não sabe (e finge muito mal que "acordou depois") ou sabe demais.</p>
<div class="callout"><b>Contra a decoreba:</b> os furos são combinações de fato do mundo, personagem e noite. Guia de wiki não resolve o jogo. O modo de seed diária usa o mesmo gerador.</div>` },

{ t: 'Interrogatório e PRESSIONAR', c: `
<h3>O interrogatório</h3>
<p>Perguntas em árvore rasa: três ou quatro perguntas base e follow-ups que fazem referência ao que a pessoa já respondeu. Cada resposta gera de um a três fatos no Caderno. Perguntar custa tempo, e a fila lá fora não melhora sozinha.</p>
<h3>PRESSIONAR, a aposta central do jogo</h3>
<p>No Caderno, o jogador marca <b>dois fatos que se contradizem</b> e joga na cara do visitante. <b>Só uma tentativa por visitante.</b> Custa 20 minutos.</p>
<table>
<tr><th>Situação</th><th>O que acontece</th></tr>
<tr><td>A contradição é real e a pessoa é cópia</td><td><b>A máscara desliza.</b> Não é uma confissão. É algo errado demais: ela repete, palavra por palavra, a frase de outro visitante de duas noites atrás. Ou sorri. Ou diz "isso não é relevante para a minha entrada". Vai embora sem discutir. <b>E as próximas cópias param de cometer aquele tipo de furo.</b> Elas aprendem com o que você descobre.</td></tr>
<tr><td>A contradição é real, mas a pessoa é humana</td><td>Ela desaba e explica: trauma, memória falha, ou uma mentira por vergonha ("eu roubei o casaco de um corpo, tá? Por isso enrolei"). Você não sai com certeza nenhuma. Sai com um fato novo e com a culpa. Humanos também se contradizem, e é essa dúvida que sustenta o jogo inteiro.</td></tr>
<tr><td>A "contradição" nem existia</td><td>Você queimou seu único PRESSIONAR com aquela pessoa, e ela se fecha. Respostas curtas dali em diante.</td></tr>
</table>
<div class="callout"><b>O clipe de stream:</b> a resposta da máscara deslizando é o momento mais compartilhável do jogo. Cada cópia precisa de duas ou três variações de resposta errada demais, todas ditas com uma calma absoluta. Vale investir pesado em escrita e som aqui.</div>` },

{ t: 'Tempo, Fila e Bateria', c: `
<h3>Tempo por ações</h3>
<p>A noite tem <b>6 horas fictícias (360 minutos)</b>. Não existe relógio correndo de verdade: cada ação desconta minutos. Assim o jogador lê com calma, mas cada escolha pesa. "Gasto meia hora num testemunho ou atendo mais uma pessoa?"</p>
<table>
<tr><th>Ação</th><th>Tempo</th><th>Bateria</th></tr>
<tr><td>Pergunta ou follow-up</td><td>10 min</td><td>2</td></tr>
<tr><td>Ferramenta biométrica</td><td>15 min</td><td>8 a 10</td></tr>
<tr><td>Holofote</td><td>5 min</td><td>5</td></tr>
<tr><td>Silêncio forçado</td><td>15 min</td><td>6</td></tr>
<tr><td>Estímulo súbito</td><td>10 min</td><td>12</td></tr>
<tr><td>Cruzamento de testemunhos</td><td>30 min</td><td>15</td></tr>
<tr><td>PRESSIONAR</td><td>20 min</td><td>nada</td></tr>
<tr><td>Checar a câmera interna</td><td>5 min</td><td>3</td></tr>
<tr><td>HOLD (devolver para a fila)</td><td>nada</td><td>3</td></tr>
</table>
<h3>A fila tem estado</h3>
<p>Cada pessoa esperando tem uma condição visível que piora com o tempo: <b>estável, depois ferida, depois hipotermia, depois crítica</b>. Se a noite acabar com gente na fila, o jogador <i>ouve</i> o que acontece com elas. Escolher a ordem de atendimento vira estratégia: atende primeiro o que está morrendo ou o que parece suspeito?</p>
<h3>Bateria</h3>
<ul>
<li>Recarrega a cada noite (100 por padrão, modificada por eventos, sabotagem e pelo engenheiro).</li>
<li>As ferramentas e os sistemas consomem. <b>Se zerar, as travas soltam e é game over na hora</b>, com a fila inteira entrando de uma vez.</li>
<li>São duas pressões diferentes: o tempo é o recurso da dedução, a bateria é o recurso da paranoia.</li>
</ul>` },

{ t: 'Ferramentas', c: `
<div class="callout green"><b>REGRA:</b> biometria é <b>evidência fraca</b>. Ela gera um fato no Caderno ("pulso estável demais"), nunca um veredicto. Toda leitura tem um falso positivo plausível (hipotermia, choque, treinamento militar) e as cópias aprendem a enganar os sensores conforme as noites passam.</div>
<table>
<tr><th>Ferramenta</th><th>O que ela entrega</th><th>Onde ela engana</th><th>Como as cópias se adaptam</th></tr>
<tr><td>Pulseira de Pulsação</td><td>BPM e variabilidade, com ECG na tela</td><td>Hipotermia e exaustão achatam o pulso de um humano</td><td>Da noite 3 em diante, simulam variação</td></tr>
<tr><td>Scanner Térmico</td><td>Temperatura corporal</td><td>Uma onda de frio derruba humanos para 33 ou 34 graus</td><td>Se aquecem de propósito antes de chegar</td></tr>
<tr><td>Analisador de Voz</td><td>Hesitações por minuto e microtremor</td><td>Choque e treinamento militar apagam a emoção da voz</td><td>Cada uso ensina; começam a inserir pausas falsas</td></tr>
<tr><td>Holofote</td><td>Descrição visual: roupas, feridas, gestos</td><td>Leitura subjetiva, luz ruim</td><td>Feridas cenográficas, roupas molhadas de propósito</td></tr>
<tr><td>Código de Verificação</td><td>Sabe ou não sabe a senha rotativa</td><td>Prova ACESSO, não humanidade</td><td>Roubam o código observando grupos de sobreviventes</td></tr>
<tr><td>Estímulo Súbito</td><td>Reflexo imediato ou atrasado</td><td>Pode quebrar um humano traumatizado (custo social alto). Uma vez por noite</td><td>O atraso diminui, mas nunca some. É o sinal mais confiável do jogo</td></tr>
<tr><td>Silêncio Forçado</td><td>Reação ao corte de áudio</td><td>Humano em choque também congela</td><td>Depois de caírem duas vezes, encenam desespero</td></tr>
<tr><td>Câmera de Fila</td><td>Comportamento de quem espera, sem saber que é observado</td><td>Interpretação livre</td><td>Imitam os gestos de quem está na frente</td></tr>
<tr><td>Cruzamento de Testemunhos</td><td>Um fato social profundo. A ferramenta mais forte do jogo</td><td>Memória falha, afeto cega. E <b>se o morador chamado for cópia, ele sabota</b></td><td>Estudam os alvos antes de chegar na porta</td></tr>
</table>
<p>Todas as ferramentas ficam na loja desde a primeira noite. A progressão é de domínio, não de desbloqueio.</p>` },

{ t: 'O Caderno (UI central)', c: `
<p>O painel lateral que funciona como a mesa de trabalho da dedução.</p>
<h3>As abas</h3>
<ul>
<li><b>MUNDO:</b> os boletins de rádio e os fatos públicos, noite a noite.</li>
<li><b>VISITANTES:</b> cada alegação de cada visitante, linha por linha, com hora e noite.</li>
<li><b>SALÃO:</b> o que os moradores contaram e o que a câmera interna flagrou.</li>
</ul>
<h3>Como funciona</h3>
<ul>
<li>Os fatos entram <b>sozinhos</b> quando são ditos ou lidos (como o diário de Obra Dinn). O trabalho do jogador é CRUZAR, não transcrever.</li>
<li>Cada fato é clicável. Selecionou dois e apertou CONFRONTAR? Isso é o PRESSIONAR.</li>
<li>Fatos usados em confrontos ficam marcados de verde ou vermelho.</li>
<li>Tem busca por texto. Nas noites 4 a 6, com o caderno cheio, ela vira questão de sobrevivência.</li>
</ul>
<div class="callout"><b>Decisão de UX importante:</b> o Caderno não julga. Ele nunca destaca contradições sozinho, senão o jogo se joga sem o jogador. No máximo, um contador discreto de quantos fatos cada visitante gerou.</div>` },

{ t: 'O Bunker Vivo (interior)', c: `
<h3>Confiança oculta</h3>
<p>Um número invisível, de 0 a 100, que o jogador nunca vê. Ele sente. Com confiança alta, os moradores colaboram, aceitam testemunhar e contam coisas espontaneamente. Com confiança baixa, escondem informação, se recusam a ajudar, acusam uns aos outros e começam a questionar você em voz alta.</p>
<h3>Demandas: personagens que querem coisas</h3>
<p>Todo benefício mecânico vem embrulhado numa exigência. Ninguém ajuda de graça. É isso que transforma uma ficha de atributos numa pessoa. (As demandas de cada um estão na seção Personagens.)</p>
<h3>As interrupções da câmera interna (a partir da noite 3)</h3>
<ul>
<li>No meio do expediente, a câmera do salão mostra algo errado por <b>uns 3 segundos</b>: alguém parado no escuro olhando a lente, um morador que não está no quadro às 3h da manhã, uma porta interna aberta.</li>
<li>Se o jogador clicar a tempo, o fato entra no Caderno ("Rafael saiu do salão às 2h40").</li>
<li>O custo é atenção: enquanto você olha o salão, o visitante continua falando. E o que foi dito sem você prestar atenção não entra no Caderno.</li>
</ul>
<h3>Expulsão é investigação, não botão</h3>
<p>O jogador junta fatos internos (câmera, conversas, sabotagens) e decide. E as consequências não são simétricas:</p>
<ul>
<li><b>Expulsou uma cópia:</b> as sabotagens param e o clima melhora. Mas quem gostava dela acabou de assistir a um assassinato, na visão deles.</li>
<li><b>Expulsou um humano:</b> luto, confiança despencando, testemunhas que nunca mais colaboram. E a vaga aberta te dá aquela coceira de aceitar o próximo da fila com menos cuidado.</li>
</ul>
<h3>O que uma cópia infiltrada faz de noite</h3>
<table>
<tr><th>Noite</th><th>Ação possível</th><th>Contramedida</th></tr>
<tr><td>2 em diante</td><td>Sabotagem (menos 10 de bateria máxima na noite seguinte)</td><td>O Tomás conserta, se estiver vivo e de bem com você</td></tr>
<tr><td>3 em diante</td><td>Envenenar testemunhos, dando passe livre para outras cópias</td><td>Cruzar o testemunho de dois moradores diferentes</td></tr>
<tr><td>4 em diante</td><td>Assassinato durante a madrugada (o corpo aparece na câmera)</td><td>A Cláudia reduz a chance; a câmera flagra pistas</td></tr>
<tr><td>5 em diante</td><td>Incriminar um humano, plantando evidência falsa</td><td>Só dedução mesmo</td></tr>
</table>` },

{ t: 'Personagens', c: `
<h3>Princípios</h3>
<ul>
<li>Cada personagem tem 5 camadas: <b>Identidade, Utilidade, Personalidade, Relações e Estado Oculto</b> (humano ou cópia, sorteado a cada run).</li>
<li>Toda vantagem vem com uma demanda que cria dilema. Ninguém é "só bom".</li>
<li>O jogador decide sobre <i>pessoas</i>, não sobre números. Expulsar alguém não é remover um médico do inventário. É colocar na chuva uma pessoa que talvez seja inocente.</li>
</ul>
<h3>O elenco fixo (7)</h3>
<div class="ficha"><h4>Cláudia Moreira, 43 anos, cirurgiã</h4>
<p><span class="kv"><b>Arquétipo:</b></span> racional demais. Parece cópia mesmo quando é humana.</p>
<p><span class="kv"><b>Utilidade:</b></span> reduz mortes internas e examina feridos da fila (um fato biométrico de graça).</p>
<p><span class="kv"><b>Demanda:</b></span> se recusa a tratar o ferido da noite enquanto você não expulsar quem ela acusa de ser cópia. E aí? Ela está certa? É paranoia? Ou é <i>ela</i> a cópia, limpando o caminho?</p>
<p><span class="kv"><b>Se for cópia:</b></span> vira a pessoa mais indispensável do bunker e vai insinuando que os outros moradores são instáveis. Diagnósticos falsos.</p>
<p><span class="kv"><b>Relações:</b></span> desconfia do Rafael; protege a Lia, do jeito frio dela.</p></div>
<div class="ficha"><h4>Rafael Torres, 39 anos, ex-policial</h4>
<p><span class="kv"><b>Arquétipo:</b></span> o autoritário. Às vezes está certo, mas pelos motivos errados.</p>
<p><span class="kv"><b>Utilidade:</b></span> contém crises e inibe sabotagens.</p>
<p><span class="kv"><b>Demanda:</b></span> se oferece para "interrogar do jeito dele" quem você marcar como suspeito. Informação de graça. Mas se o alvo for humano, ele quebra um inocente e metade do salão para de falar com você.</p>
<p><span class="kv"><b>Se for cópia:</b></span> usa a autoridade para espalhar medo e empurrar expulsões de humanos.</p>
<p><span class="kv"><b>Relações:</b></span> escoltou o grupo escolar da Lia; vive em atrito com a Cláudia.</p></div>
<div class="ficha"><h4>Lia Andrade, 17 anos, estudante</h4>
<p><span class="kv"><b>Arquétipo:</b></span> a traumatizada. Parece culpada mesmo quando é vítima.</p>
<p><span class="kv"><b>Utilidade:</b></span> observadora. Reconhece gente na fila e dá testemunhos que ninguém mais tem.</p>
<p><span class="kv"><b>Demanda:</b></span> só testemunha se você prometer não usar o Estímulo Súbito naquela noite. Cumprir custa sua melhor ferramenta. Quebrar a promessa faz ela se calar para sempre.</p>
<p><span class="kv"><b>Se for cópia:</b></span> usa a fragilidade como camuflagem. Se contradiz de propósito, para parecer incapaz de manipular alguém.</p>
<p><span class="kv"><b>Relações:</b></span> tem medo do Rafael; se apega à Cláudia.</p></div>
<div class="ficha"><h4>Eduardo Lima, 45 anos, professor</h4>
<p><span class="kv"><b>Arquétipo:</b></span> o pai. A alavanca emocional do jogo inteiro.</p>
<p><span class="kv"><b>Utilidade:</b></span> é o único que valida a Bia com certeza, e é bom em acalmar conflito.</p>
<p><span class="kv"><b>Demanda:</b></span> te oferece tudo o que tem para você abrir a porta para <i>qualquer</i> menina de casaco amarelo. Da noite 3 em diante, chega uma. Não é a Bia. Ele jura que é.</p>
<p><span class="kv"><b>Se for cópia:</b></span> a mochila rosa está seca. E quando tem barulho na rua, ele não se vira. Um pai se viraria.</p>
<p><span class="kv"><b>Relações:</b></span> pai da Bia (o detalhe íntimo dos dois: o coelho de pelúcia, Nino).</p></div>
<div class="ficha"><h4>Bia Lima, 12 anos, criança</h4>
<p><span class="kv"><b>Arquétipo:</b></span> a inocência que ninguém consegue julgar com frieza.</p>
<p><span class="kv"><b>Utilidade:</b></span> levanta o ânimo do salão e repara em detalhes que os adultos deixam passar.</p>
<p><span class="kv"><b>O dilema dela:</b></span> negar uma criança é a decisão mais cara do jogo em confiança. E aceitar uma cópia criança é a mais letal.</p>
<p><span class="kv"><b>Se for cópia:</b></span> fica perfeitamente parada. E não olha para o coelho de pelúcia nem uma vez.</p>
<p><span class="kv"><b>Relações:</b></span> filha do Eduardo.</p></div>
<div class="ficha"><h4>Seu Osvaldo, 67 anos, radioamador</h4>
<p><span class="kv"><b>Arquétipo:</b></span> os ouvidos do bunker. E o canal por onde a verdade chega.</p>
<p><span class="kv"><b>Utilidade:</b></span> intercepta transmissões (avisos sobre a fila) e decodifica os fragmentos que explicam o apagão.</p>
<p><span class="kv"><b>Demanda e arco:</b></span> cada noite no rádio ele dorme menos, e os relatos vão ficando menos confiáveis. Ou será que estão ficando <i>mais</i> precisos? Você decide quando mandar o velho descansar, abrindo mão da informação.</p>
<p><span class="kv"><b>Se for cópia:</b></span> "decodifica" transmissões que convenientemente empurram suas decisões para onde elas querem.</p>
<p><span class="kv"><b>Relações:</b></span> trata a Bia como neta.</p></div>
<div class="ficha"><h4>Tomás Ferreira, 51 anos, engenheiro eletricista</h4>
<p><span class="kv"><b>Arquétipo:</b></span> o pragmático que mantém a luz acesa.</p>
<p><span class="kv"><b>Utilidade:</b></span> mais 15 de bateria máxima e conserto de sabotagens.</p>
<p><span class="kv"><b>Demanda:</b></span> quer racionar energia. Exige que você limite o uso de ferramentas a um teto por noite ("ou o gerador não chega na sexta noite"). Aceitar amarra suas mãos. Recusar faz ele trabalhar de má vontade, e os consertos caem pela metade.</p>
<p><span class="kv"><b>Se for cópia:</b></span> a sabotagem vem justamente de quem conserta. A bateria some e ele "não achou o defeito".</p>
<p><span class="kv"><b>Relações:</b></span> respeita a Cláudia; implica com o Rafael.</p></div>
<h3>Os estranhos (gerados proceduralmente)</h3>
<ul>
<li>Visitantes criados na hora: nome, retrato pixelado, profissão e uma história montada sobre os fatos do mundo daquela run.</li>
<li>São o volume da fila e o alimento do motor de contradições. Nunca se repetem entre uma run e outra.</li>
<li>Também são a materialização da escassez: o bunker tem <b>vagas limitadas</b>. Cada estranho aceito é uma vaga que a Bia não vai ter na noite 4.</li>
<li>Alguns carregam ganchos: o remédio que a Cláudia estava pedindo, um documento com um pedaço da verdade, uma acusação contra alguém que já está lá dentro.</li>
</ul>
<h3>Relações e detalhes íntimos (para os testemunhos)</h3>
<table>
<tr><th>Par</th><th>O detalhe que é difícil de falsificar</th></tr>
<tr><td>Eduardo e Bia</td><td>O nome do coelho de pelúcia (Nino)</td></tr>
<tr><td>Rafael e Lia</td><td>O grupo de estudantes escoltado até o ginásio</td></tr>
<tr><td>Cláudia e Rafael</td><td>A evacuação do hospital Santa Marta</td></tr>
<tr><td>Osvaldo e Bia</td><td>A música que ele deixava tocar no rádio para ela</td></tr>
<tr><td>Tomás e Cláudia</td><td>O gerador do hospital que ele consertou durante o apagão</td></tr>
</table>` },

{ t: 'Campanha: as 6 Noites', c: `

{ t: 'Vitória, Derrota e Finais', c: `
<h3>As condições</h3>
<ul>
<li><b>Vitória:</b> atravessar as 6 noites com o bunker de pé.</li>
<li><b>Derrota 1:</b> todos os moradores mortos (depois que o salão já foi habitado).</li>
<li><b>Derrota 2:</b> bateria zerada. As travas soltam e a fila inteira entra <i>no mesmo passo, no mesmo ritmo, como se sempre tivesse sido uma coisa só</i>.</li>
</ul>
<h3>Os finais (duas camadas que não dependem uma da outra)</h3>
<table>
<tr><th>Camada</th><th>Estados possíveis</th></tr>
<tr><td><b>Sobrevivência</b></td><td>AMANHECER (o salão está vivo e sem nenhuma cópia) · ELES ESTÃO DENTRO (você sobreviveu, mas tem cópia no salão) · O COFRE VAZIO (você sobreviveu sozinho)</td></tr>
<tr><td><b>Verdade</b></td><td>Depende dos fragmentos coletados, de 0 a 5: vai de "você nunca soube o que aconteceu" até a revelação completa da causa do apagão</td></tr>
</table>
<p>A combinação das duas camadas gera mais de 9 epílogos. E no fim de toda run, o jogo abre o arquivo: quem era cópia, quem era humano, o que cada decisão sua causou. É esse momento que faz as pessoas discutirem o jogo e começarem outra run na hora.</p>` },

<li>Paleta: verdes fósforo (#8dffa8) e âmbares (#ffcf7d) sobre marrons escuros. O vermelho fica reservado só para o perigo. Se algo está vermelho na tela, algo está errado.</li>

// ============================================================
// APP
// ============================================================
const LS_KEY = 'bp40-gdd-v2';
let DOC = null;

function uid() { return 'S' + Math.random().toString(36).slice(2, 9); }

function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) { DOC = JSON.parse(raw); return; }
  } catch (e) {}
  DOC = JSON.parse(JSON.stringify(DEFAULT_DOC));
  DOC.sections.forEach(s => s.id = uid());
}

let saveTimer = null;
function scheduleSave() {
  $('saveState').textContent = 'editando...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, 600);
}
function save() {
  // recolhe conteúdo do DOM para o modelo
  document.querySelectorAll('.section').forEach(el => {
    const s = DOC.sections.find(x => x.id === el.dataset.id);
    if (!s) return;
    s.t = el.querySelector('.sec-title').textContent.trim() || 'Sem título';
    s.c = el.querySelector('.sec-body').innerHTML;
  });
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(DOC));
    $('saveState').textContent = '✔ salvo ' + new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    $('saveState').textContent = '⚠ erro ao salvar';
  }
}

function $(id) { return document.getElementById(id); }

// ---------------- render ----------------
function render() {
  const main = $('main');
  main.innerHTML = '';
  DOC.sections.forEach((s, i) => main.appendChild(sectionEl(s, i)));
  renderNav();
}

function sectionEl(s, i) {
  const el = document.createElement('div');
  el.className = 'section';
  el.dataset.id = s.id;
  el.id = 'sec-' + s.id;

  const head = document.createElement('div');
  head.className = 'sec-head';
  const num = document.createElement('span');
  num.className = 'num';
  num.textContent = String(i + 1).padStart(2, '0');
  const title = document.createElement('div');
  title.className = 'sec-title';
  title.contentEditable = 'true';
  title.spellcheck = false;
  title.textContent = s.t;
  title.addEventListener('input', scheduleSave);
  title.addEventListener('blur', () => { save(); renderNav(); });
  title.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); title.blur(); } });

  const ctrl = document.createElement('div');
  ctrl.className = 'sec-ctrl';
  ctrl.appendChild(cbtn('↑', 'mover para cima', () => moveSection(s.id, -1)));
  ctrl.appendChild(cbtn('↓', 'mover para baixo', () => moveSection(s.id, 1)));
  const del = cbtn('✕', 'excluir seção', () => {
    if (confirm('Excluir a seção "' + s.t + '"?')) {
      DOC.sections = DOC.sections.filter(x => x.id !== s.id);
      render(); save();
    }
  });
  del.classList.add('del');
  ctrl.appendChild(del);

  head.appendChild(num); head.appendChild(title); head.appendChild(ctrl);

  const body = document.createElement('div');
  body.className = 'sec-body';
  body.contentEditable = 'true';
  body.spellcheck = false;
  body.innerHTML = s.c;
  body.addEventListener('input', scheduleSave);
  body.addEventListener('blur', save);

  el.appendChild(head); el.appendChild(body);
  return el;
}

function cbtn(txt, tip, fn) {
  const b = document.createElement('button');
  b.className = 'cbtn'; b.textContent = txt; b.title = tip;
  b.onclick = fn;
  return b;
}

function moveSection(id, dir) {
  save();
  const i = DOC.sections.findIndex(x => x.id === id);
  const j = i + dir;
  if (j < 0 || j >= DOC.sections.length) return;
  [DOC.sections[i], DOC.sections[j]] = [DOC.sections[j], DOC.sections[i]];
  render(); save();
  document.getElementById('sec-' + id).scrollIntoView({ block: 'center' });
}

function addSection() {
  save();
  const t = prompt('Título da nova seção:', 'Nova seção');
  if (t === null) return;
  const s = { id: uid(), t: t || 'Nova seção', c: '<p>Escreva aqui...</p>' };
  DOC.sections.push(s);
  render(); save();
  document.getElementById('sec-' + s.id).scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ---------------- navegação ----------------
function renderNav() {
  const q = ($('navSearch').value || '').toLowerCase();
  const list = $('navList');
  list.innerHTML = '';
  DOC.sections.forEach((s, i) => {
    if (q && !s.t.toLowerCase().includes(q)) return;
    const it = document.createElement('div');
    it.className = 'navItem';
    it.dataset.target = 'sec-' + s.id;
    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = String(i + 1).padStart(2, '0');
    it.appendChild(num);
    it.appendChild(document.createTextNode(s.t));
    it.onclick = () => document.getElementById('sec-' + s.id).scrollIntoView({ behavior: 'smooth', block: 'start' });
    list.appendChild(it);
  });
}

// destaque da seção visível
const obs = new IntersectionObserver(entries => {
  entries.forEach(en => {
    if (en.isIntersecting) {
      document.querySelectorAll('.navItem').forEach(n =>
        n.classList.toggle('active', n.dataset.target === en.target.id));
    }
  });
}, { rootMargin: '-30% 0px -60% 0px' });

function observeAll() {
  document.querySelectorAll('.section').forEach(s => obs.observe(s));
}

// ---------------- formatação ----------------
function fmt(ev, cmd) {
  ev.preventDefault();
  document.execCommand(cmd, false, null);
  scheduleSave();
}
function fmtBlock(ev, tag) {
  ev.preventDefault();
  document.execCommand('formatBlock', false, tag);
  scheduleSave();
}
function insertHTMLAtCursor(ev, html) {
  ev.preventDefault();
  document.execCommand('insertHTML', false, html);
  scheduleSave();
}

// ---------------- import / export ----------------
function exportJSON() {
  save();
  const blob = new Blob([JSON.stringify(DOC, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'GDD-Bunker-Protocolo-40_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importJSON(input) {
  const f = input.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const d = JSON.parse(r.result);
      if (!d.sections || !Array.isArray(d.sections)) throw new Error('formato inválido');
      d.sections.forEach(s => { if (!s.id) s.id = uid(); });
      DOC = d;
      render(); observeAll(); save();
    } catch (e) {
      alert('Arquivo inválido: ' + e.message);
    }
  };
  r.readAsText(f);
  input.value = '';
}
function restoreDefault() {
  if (!confirm('Restaurar o GDD padrão? Suas edições atuais serão PERDIDAS (exporte um backup antes, se quiser).')) return;
  DOC = JSON.parse(JSON.stringify(DEFAULT_DOC));
  DOC.sections.forEach(s => s.id = uid());
  render(); observeAll(); save();
}

// ---------------- layout dinâmico ----------------
function adjustLayout() {
  const top = $('topbar').offsetHeight;
  const fmt = $('fmtbar');
  fmt.style.top = top + 'px';
  $('sidebar').style.top = top + 'px';
  $('main').style.paddingTop = (top + fmt.offsetHeight + 24) + 'px';
}
window.addEventListener('resize', adjustLayout);
new ResizeObserver(adjustLayout).observe(document.getElementById('fmtbar'));
new ResizeObserver(adjustLayout).observe(document.getElementById('topbar'));

// ---------------- init ----------------
load();
render();
observeAll();
adjustLayout();
$('saveState').textContent = localStorage.getItem(LS_KEY) ? '✔ carregado do navegador' : 'documento padrão';
window.addEventListener('beforeunload', save);
</script>
</body>
